name: Build_JDC.yml

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: AX1800.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) 2>&1 | tee build.log
        # 如果多线程失败，尝试单线程并输出详细日志
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "Multi-thread build failed, retrying with single thread and verbose output"
          make -j1 V=s 2>&1 | tee -a build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build failed!"
            exit 1
          fi
        fi
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # ========== 验证实际编译成功的软件包（改进路径查找） ==========
    - name: Verify compiled packages
      id: verify
      if: steps.compile.outputs.status == 'success'
      run: |
        # 查找 sysupgrade 固件所在目录
        FIRMWARE_DIR=$(find openwrt/bin/targets -name "*.sysupgrade.bin" -exec dirname {} \; | head -n1)
        if [ -z "$FIRMWARE_DIR" ]; then
          echo "⚠️ 未找到 sysupgrade 固件，跳过验证"
          echo "## ⚠️ 固件验证跳过（未找到 sysupgrade 文件）" >> $GITHUB_STEP_SUMMARY
          exit 0
        fi
        echo "验证固件目录：$FIRMWARE_DIR"

        # 安装 unsquashfs（如果未安装）
        sudo apt-get install -y squashfs-tools

        # 解压固件到临时目录
        mkdir -p /tmp/rootfs
        unsquashfs -d /tmp/rootfs "$FIRMWARE_DIR"/*-sysupgrade.bin

        # 从 opkg status 文件中提取已安装的包
        if [ -f /tmp/rootfs/usr/lib/opkg/status ]; then
          grep '^Package:' /tmp/rootfs/usr/lib/opkg/status | awk '{print $2}' | sort > /tmp/actual-packages.txt
          PKG_COUNT=$(wc -l < /tmp/actual-packages.txt)
          echo "✅ 实际编译成功的软件包数量: $PKG_COUNT"
          echo "## 📦 实际编译成功的软件包（共 $PKG_COUNT 个）" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/actual-packages.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # 保存到固件目录，供后续 Release 使用
          cp /tmp/actual-packages.txt "$FIRMWARE_DIR"/actual-packages.txt
        else
          echo "⚠️ 未找到 opkg status 文件，无法验证"
          echo "## ⚠️ 无法验证软件包列表（未找到 status 文件）" >> $GITHUB_STEP_SUMMARY
        fi

        # 清理临时文件
        rm -rf /tmp/rootfs

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    # ========== 改进：精确查找固件目录 ==========
    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        # 使用 find 定位第一个包含 sysupgrade 的目录（即固件输出目录）
        FIRMWARE_DIR=$(find openwrt/bin/targets -name "*.sysupgrade.bin" -exec dirname {} \; | head -n1)
        if [ -z "$FIRMWARE_DIR" ]; then
          echo "❌ 未找到 sysupgrade 固件，无法上传！"
          exit 1
        fi
        cd "$FIRMWARE_DIR"
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "📁 固件目录：$PWD"
        ls -lh

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # ========== 生成 Release 标签（修复语法） ==========
    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        # 构建 Release 说明
        echo "# OpenWrt 固件发布" > release.txt
        echo "**编译时间**: $(date)" >> release.txt
        echo "**设备**: 京东云亚瑟 (AX1800 Pro)" >> release.txt
        echo "" >> release.txt
        # 如果存在软件包列表，追加
        if [ -f "${{ env.FIRMWARE }}/actual-packages.txt" ]; then
          echo "## 📦 固件中包含的软件包（实际编译成功）" >> release.txt
          echo '```' >> release.txt
          cat "${{ env.FIRMWARE }}/actual-packages.txt" >> release.txt
          echo '```' >> release.txt
        else
          echo "⚠️ 未生成软件包列表，请检查编译日志" >> release.txt
        fi
        echo "" >> release.txt
        # 安全写法：如果启用了 GoFile 且 URL 存在，则追加（但本工作流未定义，故忽略）
        # 如需使用，请确保 UPLOAD_GOFILE 和 steps.gofile 存在，否则不要写这行
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
