#
# https://github.com/P3TERX/Actions-OpenWrt
#
# File: .github/workflows/openwrt-builder.yml
# Description: Build ImmortalWrt with caching and optimized environment
#
# Optimized for speed with ccache/staging_dir caching and ImmortalWrt official init script
#

name: Build_immortal

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: AX1800.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04  # 使用更新的 runner
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ---------- 环境初始化（ImmortalWrt 官方脚本，精简高效） ----------
    - name: Build System Setup
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt -yqq install dos2unix libfuse-dev
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq autoclean
        sudo -E apt -yqq clean
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    # ---------- 克隆源码 ----------
    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        # 设置软链接以便后续步骤引用（可选）
        ln -sf $PWD/openwrt $GITHUB_WORKSPACE/openwrt

    # ---------- 自定义 feeds ----------
    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # ---------- 自定义配置 ----------
    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # ---------- 缓存：ccache 和 staging_dir ----------
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: |
          openwrt/.ccache
          openwrt/staging_dir
        # 使用 .config 的 hash 作为缓存键的一部分，配置变化时失效
        key: ${{ runner.os }}-${{ hashFiles('openwrt/.config') }}-${{ env.TZ }}
        restore-keys: |
          ${{ runner.os }}-${{ hashFiles('openwrt/.config') }}-

    # ---------- 刷新缓存时间戳（避免 make 误判） ----------
    - name: Refresh cache stamps
      run: |
        if [ -d "openwrt/staging_dir" ]; then
          find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" | while read -r dir; do
            find "$dir" -type f -exec touch {} +
          done
        fi

    # ---------- 下载源码包 ----------
    - name: Download package
      run: |
        cd openwrt
        make defconfig
        # 启用 ccache
        export PATH="/usr/lib/ccache:$PATH"
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # ---------- 编译固件 ----------
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        export PATH="/usr/lib/ccache:$PATH"
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # ---------- 清理旧缓存（节省空间） ----------
    - name: Delete Old Cache
      run: |
        # 删除旧缓存（保留当前使用的键）
        gh cache list --key ${{ runner.os }}-${{ hashFiles('openwrt/.config') }}- --json key --jq '.[] | .key' | while read -r key; do
          if [[ "$key" != "${{ runner.os }}-${{ hashFiles('openwrt/.config') }}-${{ env.TZ }}" ]]; then
            gh cache delete "$key" || true
          fi
        done
        echo "ccache: $(du -sh openwrt/.ccache 2>/dev/null | cut -f1)"
        echo "staging: $(du -sh openwrt/staging_dir 2>/dev/null | cut -f1)"

    # ---------- 准备 Release 内容 ----------
    - name: Generate release tag and body
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "# ImmortalWrt 固件发布" > release.txt
        echo "**编译时间**: $(date)" >> release.txt
        echo "**源码分支**: ${{ env.REPO_BRANCH }}" >> release.txt
        echo "**设备**: 京东云亚瑟 (AX1800 Pro)" >> release.txt
        echo "" >> release.txt
        # 可选：列出已安装的插件
        if [ -f "openwrt/bin/targets/*/*/*.manifest" ]; then
          echo "## 📦 包含的插件" >> release.txt
          echo '```' >> release.txt
          grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" openwrt/bin/targets/*/*/*.manifest | awk -F":" '{print $NF}' | sort -u >> release.txt
          echo '```' >> release.txt
        fi
        echo "status=success" >> $GITHUB_OUTPUT

    # ---------- 定位固件目录 ----------
    - name: Locate firmware directory
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        FIRMWARE_DIR=$(find openwrt/bin/targets -name "*-sysupgrade.bin" -exec dirname {} \; | head -n1)
        if [ -z "$FIRMWARE_DIR" ]; then
          echo "❌ 未找到 sysupgrade 固件，无法上传！"
          exit 1
        fi
        cd "$FIRMWARE_DIR"
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "📁 固件目录：$PWD"
        ls -lh

    # ---------- 发布到 GitHub Release ----------
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && steps.organize.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: "Firmware - ${{ steps.tag.outputs.release_tag }}"
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/*-sysupgrade.bin
          ${{ env.FIRMWARE }}/*-factory.bin

    # ---------- 清理旧 Releases 和工作流 ----------
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
