name: Build_immortal

on:
  workflow_dispatch:
  repository_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: AX1800.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ================= ENV =================
    - name: Setup environment
      run: |
       sudo timedatectl set-timezone "Asia/Shanghai"

        sudo -E apt update

        sudo -E apt install -y \
        build-essential clang flex bison g++ gawk gcc-multilib \
        g++-multilib gettext git libncurses5-dev libssl-dev \
        python3 python3-pip python3-setuptools \
        rsync unzip zlib1g-dev file wget \
        libelf-dev libncursesw5-dev

         sudo -E apt autoremove -y
         sudo -E apt clean
    
    # ================= SOURCE =================
    - name: Clone source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $PWD/openwrt $GITHUB_WORKSPACE/openwrt

    # ================= FEEDS =================
    - name: Load feeds
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # ================= CONFIG =================
    - name: Load config
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # ================= DEFCONFIG =================
    - name: Defconfig
      run: |
        cd openwrt
        make defconfig

        echo "===== TARGET CHECK ====="
        grep CONFIG_TARGET openwrt/.config || true

        echo "===== DEVICE CHECK ====="
        grep CONFIG_TARGET_DEVICE openwrt/.config || true

    # ================= CACHE =================
    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/.ccache
        key: ${{ runner.os }}-${{ hashFiles('openwrt/.config') }}

    # ================= DOWNLOAD =================
    - name: Download
      run: |
        cd openwrt
        make download -j$(nproc) V=s

    # ================= BUILD =================
    - name: Compile firmware
      id: compile
      run: |
        cd openwrt

        make -j$(nproc) V=s || make -j1 V=s

        echo "===== BUILD RESULT ====="
        find bin/targets -type f || true

        echo "===== SYSUPGRADE CHECK ====="
        find bin/targets -name "*sysupgrade*" || true

        if ! find bin/targets -name "*sysupgrade*" | grep -q .; then
          echo "❌ ERROR: No sysupgrade firmware generated!"
          exit 1
        fi

        echo "status=success" >> $GITHUB_OUTPUT

    # ================= COLLECT IPK =================
    - name: Collect IPK
      run: |
        mkdir -p ipk_output
        find openwrt/bin -name "*.ipk" -exec cp {} ipk_output/ \; || true
        ls -lh ipk_output || true

    # ================= RELEASE INFO =================
    - name: Generate release
      id: tag
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

        echo "# ImmortalWrt Build" > release.txt
        echo "Build Time: $(date)" >> release.txt
        echo "Branch: $REPO_BRANCH" >> release.txt

        echo "" >> release.txt
        echo "Packages:" >> release.txt

        find openwrt/bin/targets -name "*.manifest" | head -n1 | xargs cat | grep luci-app || true >> release.txt

    # ================= LOCATE FIRMWARE =================
    - name: Locate firmware
      id: firmware
      run: |
        SYSUP=$(find openwrt/bin/targets -name "*sysupgrade*" | head -n1)

        if [ -z "$SYSUP" ]; then
          echo "❌ No firmware found"
          exit 1
        fi

        echo "FIRMWARE_DIR=$(dirname $SYSUP)" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    # ================= UPLOAD =================
    - name: Upload release
      uses: softprops/action-gh-release@v2
      if: steps.firmware.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: ImmortalWrt-${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE_DIR }}/*
          ipk_output/*.ipk

    # ================= CLEAN =================
    - name: Delete old runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 3
        keep_minimum_runs: 2

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
