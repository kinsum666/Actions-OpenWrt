name: Build netem IPK (with Luci)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout user config
        uses: actions/checkout@v4
        with:
          path: user_repo

      - name: Checkout OpenWrt
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt -b master openwrt

      - name: Fetch netem source
        run: |
          git clone --depth=1 https://github.com/kinsum666/openwrt-netem netem
          cp -r netem/net/network/netem-control openwrt/package/
          cp -r netem/luci/LuCI/luci-app-netem openwrt/package/

      - name: Install build dependencies
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential ccache git file python3 python3-dev python3-pip python3-venv unzip wget
          sudo -E apt-get -qq install libncurses5-dev libssl-dev zlib1g-dev gawk flex gettext
          sudo -E apt-get -qq install libreadline-dev libncurses-dev

      - name: Prepare .config
        run: |
          cp user_repo/AX1800.config openwrt/.config
          cd openwrt
          echo "CONFIG_PACKAGE_netem-control=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-netem=y" >> .config
          make defconfig
          make oldconfig

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make oldconfig

      - name: Download sources and toolchain
        run: |
          cd openwrt
          make download -j8

      # 关键：先构建 host 工具，避免 lua host 编译失败
      - name: Build host tools (with retry)
        run: |
          cd openwrt
          make tools/install -j$(nproc) 2>&1 | tee tools_install.log || { \
            echo "tools/install failed, retrying with -j1 V=s"; \
            make tools/install -j1 V=s 2>&1 | tee -a tools_install.log; \
            exit 1; \
          }

      - name: Build toolchain (with retry)
        run: |
          cd openwrt
          make toolchain/install -j$(nproc) 2>&1 | tee toolchain_install.log || { \
            echo "toolchain/install failed, retrying with -j1 V=s"; \
            make toolchain/install -j1 V=s 2>&1 | tee -a toolchain_install.log; \
            exit 1; \
          }

      - name: Compile netem-control
        run: |
          cd openwrt
          make package/netem-control/compile -j$(nproc) V=s 2>&1 | tee netem_compile.log || { \
            make package/netem-control/compile -j1 V=s 2>&1 | tee -a netem_compile.log; \
            exit 1; \
          }

      - name: Compile luci-app-netem
        run: |
          cd openwrt
          make package/luci-app-netem/compile -j$(nproc) V=s 2>&1 | tee luci_compile.log || { \
            make package/luci-app-netem/compile -j1 V=s 2>&1 | tee -a luci_compile.log; \
            exit 1; \
          }

      - name: Collect IPKs
        run: |
          mkdir ipk_output
          find openwrt/bin/packages -name "*.ipk" | grep -E "(netem-control|luci-app-netem)" | xargs -I {} cp {} ipk_output/ 2>/dev/null || true
          find openwrt/bin -name "*.ipk" | grep -E "(netem-control|luci-app-netem)" | xargs -I {} cp {} ipk_output/ 2>/dev/null || true

      - name: Upload IPKs
        uses: actions/upload-artifact@v4
        with:
          name: netem-ipks
          path: ipk_output/*.ipk
