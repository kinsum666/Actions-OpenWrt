#
# https://github.com/P3TERX/Actions-OpenWrt
#
# File: .github/workflows/openwrt-builder.yml
# Description: Build OpenWrt (official) with caching and optimized environment
#

name: OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: AX1800.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ---------- 精简环境初始化（仅安装核心依赖） ----------
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        # 仅安装 OpenWrt 编译必需的核心包（移除所有非必需包）
        sudo -E apt-get -qq install build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils python3-pip python3-venv rsync unzip zlib1g-dev file wget
        # device-tree-compiler 和 ccache 用于加速
        sudo -E apt-get -qq install device-tree-compiler ccache
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # ---------- 克隆源码 ----------
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # ---------- 自定义 feeds ----------
    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # ---------- 自定义配置 ----------
    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # ---------- 缓存：ccache 和 staging_dir ----------
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: |
          openwrt/.ccache
          openwrt/staging_dir
        # 缓存键基于 .config 哈希，配置变化时自动失效
        key: ${{ runner.os }}-${{ hashFiles('openwrt/.config') }}-${{ env.TZ }}
        restore-keys: |
          ${{ runner.os }}-${{ hashFiles('openwrt/.config') }}-

    # ---------- 刷新缓存时间戳（避免 make 误判过期） ----------
    - name: Refresh cache stamps
      run: |
        if [ -d "openwrt/staging_dir" ]; then
          find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" | while read -r dir; do
            find "$dir" -type f -exec touch {} +
          done
        fi

    # ---------- 下载源码包 ----------
    - name: Download package
      run: |
        cd openwrt
        make defconfig
        export PATH="/usr/lib/ccache:$PATH"
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # ---------- 编译固件（保持原重试逻辑） ----------
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        export PATH="/usr/lib/ccache:$PATH"
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # ---------- 准备 Release 内容 ----------
    - name: Generate release tag and body
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "# OpenWrt 固件发布" > release.txt
        echo "**编译时间**: $(date)" >> release.txt
        echo "**源码分支**: ${{ env.REPO_BRANCH }}" >> release.txt
        echo "" >> release.txt
        # 提取插件列表（如果存在 manifest）
        MANIFEST=$(find openwrt/bin/targets -name "*.manifest" | head -n1)
        if [ -n "$MANIFEST" ]; then
          echo "## 📦 包含的插件" >> release.txt
          echo '```' >> release.txt
          grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" "$MANIFEST" | awk -F":" '{print $NF}' | sort -u >> release.txt
          echo '```' >> release.txt
        fi
        echo "status=success" >> $GITHUB_OUTPUT

    # ---------- 定位固件目录 ----------
    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        FIRMWARE_DIR=$(find openwrt/bin/targets -name "*-sysupgrade.bin" -exec dirname {} \; | head -n1)
        if [ -z "$FIRMWARE_DIR" ]; then
          echo "❌ 未找到 sysupgrade 固件，无法上传！"
          exit 1
        fi
        cd "$FIRMWARE_DIR"
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "📁 固件目录：$PWD"
        ls -lh

    # ---------- 发布到 GitHub Release（只上传 sysupgrade 和 factory） ----------
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && steps.organize.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: "Firmware - ${{ steps.tag.outputs.release_tag }}"
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/*-sysupgrade.bin
          ${{ env.FIRMWARE }}/*-factory.bin

    # ---------- 清理旧工作流和 Release ----------
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
